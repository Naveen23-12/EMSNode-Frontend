<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

<div class="login-wrapper">
    <div class="glass-login">

        <h2>EMS Application</h2>
        <img class="img" src="./images/logo.png" alt="img">

        <!-- EMAIL + PASSWORD -->
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()" class="btn-glossy">Login</button>

        <p id="error" class="error-message"></p>

    </div>
</div>

<!-- 🔐 OTP MODAL -->
<div id="otpModal" class="otp-modal">
    <div class="otp-box">
        <h3>Enter OTP</h3>

        <input id="otp" placeholder="Enter OTP">

        <button onclick="verifyOTP()" class="btn-glossy">Verify</button>

        <p id="otpError" class="error-message"></p>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
